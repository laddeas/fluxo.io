apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/auth/?(.*)
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/v1/users/?(.*)
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3002
          - path: /api/v1/tenants/?(.*)
            pathType: Prefix
            backend:
              service:
                name: tenant-service
                port:
                  number: 3003
          - path: /api/v1/settings/?(.*)
            pathType: Prefix
            backend:
              service:
                name: settings-service
                port:
                  number: 3008
          - path: /api/v1/audit/?(.*)
            pathType: Prefix
            backend:
              service:
                name: audit-service
                port:
                  number: 3010
