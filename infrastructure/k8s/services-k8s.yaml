apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: datafusion-ai/auth-service:latest
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: "datafusion"
            - name: DB_PASSWORD
              value: "datafusion_dev_2024"
            - name: DB_DATABASE
              value: "datafusion"
            - name: JWT_SECRET
              value: "datafusion_secret_key_2024"
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  ports:
    - port: 3001
  selector:
    app: auth-service
---
