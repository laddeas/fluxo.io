# ============================================================================
# DataFusion AI — Production Docker Compose Configuration (GCP Optimized)
# Defines 9 NestJS Microservices, Frontend Web, & Shared Infrastructure
# ============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # 1. Databases & Infrastructure Dependencies
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-datafusion}
      POSTGRES_USER: ${DB_USER:-datafusion}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-datafusion_prod_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datafusion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-datafusion_redis_prod}
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-datafusion_redis_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-datafusion}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:-datafusion_rabbit_prod}
      RABBITMQ_DEFAULT_VHOST: ${RABBIT_VHOST:-datafusion}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --------------------------------------------------------------------------
  # 2. NestJS Backend Microservices
  # --------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=auth-service
        - START_COMMAND=node dist/services/auth-service/src/main.js
    restart: always
    depends_on:
      - redis
    ports:
      - "3001:3001"
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-datafusion_redis_prod}
      AUTH_PORT: 3001
      PORT: 3001

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=user-service
        - START_COMMAND=node dist/services/user-service/src/main.js
    restart: always
    depends_on:
      - postgres
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      USER_PORT: 3002
      PORT: 3002

  tenant-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=tenant-service
        - START_COMMAND=node dist/services/tenant-service/src/main.js
    restart: always
    depends_on:
      - postgres
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      TENANT_PORT: 3003
      PORT: 3003

  connector-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=connector-service
        - START_COMMAND=node dist/services/connector-service/src/main.js
    restart: always
    depends_on:
      - postgres
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      CONNECTOR_PORT: 3004
      PORT: 3004

  interface-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=interface-service
        - START_COMMAND=node dist/services/interface-service/src/main.js
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      RABBITMQ_URL: amqp://${RABBIT_USER:-datafusion}:${RABBIT_PASSWORD:-datafusion_rabbit_prod}@rabbitmq:5672/${RABBIT_VHOST:-datafusion}
      INTERFACE_PORT: 3005
      PORT: 3005

  job-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=job-service
        - START_COMMAND=node dist/services/job-service/src/main.js
    restart: always
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "3006:3006"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      RABBITMQ_URL: amqp://${RABBIT_USER:-datafusion}:${RABBIT_PASSWORD:-datafusion_rabbit_prod}@rabbitmq:5672/${RABBIT_VHOST:-datafusion}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-datafusion_redis_prod}
      JOB_PORT: 3006
      PORT: 3006

  workflow-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=workflow-service
        - START_COMMAND=node dist/services/workflow-service/src/main.js
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3007:3007"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      RABBITMQ_URL: amqp://${RABBIT_USER:-datafusion}:${RABBIT_PASSWORD:-datafusion_rabbit_prod}@rabbitmq:5672/${RABBIT_VHOST:-datafusion}
      WORKFLOW_PORT: 3007
      PORT: 3007

  settings-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=settings-service
        - START_COMMAND=node dist/services/settings-service/src/main.js
    restart: always
    depends_on:
      - postgres
    ports:
      - "3008:3008"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      SETTINGS_PORT: 3008
      PORT: 3008

  audit-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_PATH=audit-service
        - START_COMMAND=node dist/services/audit-service/src/main.js
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datafusion}:${DB_PASSWORD:-datafusion_prod_password}@postgres:5432/${DB_NAME:-datafusion}
      RABBITMQ_URL: amqp://${RABBIT_USER:-datafusion}:${RABBIT_PASSWORD:-datafusion_rabbit_prod}@rabbitmq:5672/${RABBIT_VHOST:-datafusion}
      AUDIT_PORT: 3010
      PORT: 3010

  # --------------------------------------------------------------------------
  # 3. React Vite Frontend (Served via Nginx)
  # --------------------------------------------------------------------------
  web-frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - interface-service
      - job-service

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
